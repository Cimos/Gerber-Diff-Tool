name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest -q --cov=gerberdiff --cov-report=term-missing --cov-fail-under=90

      - name: Smoke-test the CLI on the fixtures
        run: uv run gdiff tests/fixtures/revA tests/fixtures/revB -o diff-report.html --json diff.json

  action-self-test:
    name: action self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run the gerber-diff action on the fixtures
        uses: ./
        with:
          old: tests/fixtures/revA
          new: tests/fixtures/revB
          report-artifact-name: action-self-test-report
